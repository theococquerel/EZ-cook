<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle"></title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header id="mainHeader">
        <h1 id="mainTitle">EZ'Cook</h1>

        <div id="formConnect">

            <div id="adminTitle">Connexion</div>
            <form method="post" id="formCo">

                <label>Identifiant</label>      
                <input id="login" type="text" name="login"><br>

                <label>Mot de passe</label>
                <input id="password" type="password" name="password"><br>

                <div id="logResult"></div>

                <button id="connection" type="submit">Se connecter</button>
                <button id="reset" type="reset">Reset</button>
            </form>

        </div>
    </header>
    <br><br><br><br><br><br>
    <main id="mainContent">
        <p style="font-weight: bolder;">Bienvenue sur le (meilleur) site de cuisine de tous les temps !</p>

        <div id="formResearch">
        <form method="post" id="formRes">
            <input id="research" type="text" name="research" placeholder="Rechercher une recette...">
            <button id="resButton" type="button">Rechercher</button>
        </form>
        </div>
        <br>
        <p>Ce site vous permettra de cuisiner simplement... et sans mettre le feu à la cuisine !</p><br><br>

        <p>Nos recettes...</p><br><br>
        <div id="templateCook">

        </div>


    </main>
    <footer id="mainFooter">
        Sources : 
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function(){
            // préparation de la page (mode visiteur)
            let modeAdministrateurActif = false;
            let pageTitle = document.getElementById("pageTitle");
            pageTitle.innerText = "EZ'Cook";

            let form = document.getElementById("formCo");

            // récupération du conteneur du formulaire d'authentification
            let connect = document.getElementById("formConnect");
            // sauvegarde du contenu d'origine
            let connectInit = connect.innerHTML;




            // récupération et vérification de la paire login/MDP
            form.addEventListener('submit', function(event){
                event.preventDefault();
                let result = document.getElementById("logResult");


                if(form.login.value == ""){
                    event.preventDefault();
                    result.style.color = "yellow";
                    result.innerText = "L'identifiant ne peut pas être vide !";
                } else if(form.password.value == ""){
                    event.preventDefault();
                    result.style.color = "yellow";
                    result.innerText = "Le mot de passe ne peut pas être vide !";
                }
                else{
                    if(form.login.value == "admin2026" && form.password.value == "projet3"){
                        result.style.color = "lightgreen";
                        pageTitle.innerText = "EZ'Cook (administrateur)";
                        result.innerText = "Connexion réussie : entrée en mode administrateur.";
                        window.setTimeout(function(){
                            result.innerText = "";
                            let admin = document.getElementById("adminTitle");
                            admin.innerText = "Mode administrateur";
                            modeAdministrateurActif = true;
                            form.password.value = "";
                            form.login.value = "";
                            connect.innerHTML = `
                            <div id="adminTitle">Mode administrateur</div><br>
                            <button id="disconnect">Se déconnecter</button>`;

                            // gestion du cas déconnexion
                            let disco = document.getElementById("disconnect");
                            disco.addEventListener('click', function(){
                                connect.innerHTML = connectInit;
                                modeAdministrateurActif = false;
                                pageTitle.innerText = "EZ'Cook";
                            })
                        }, 5000)

                        

                    } else{
                        result.style.color = "yellow";
                        result.innerText = "Identifiant ou mot de passe incorrect.";
                    } 
                }
            })

            form.addEventListener('reset', function(){
                let result = document.getElementById("logResult");
                result.innerText = ""
            })

            let recettes = [
                { titre: "Pâtes carbonara", ingredients: "pâtes, oeuf, lardons", tags: ["facile", "bon marché"], description: "Spécialité italienne, à base de spaghetti auxquels sont ajoutés du pecorino et des jaunes d'oeuf, puis du guanciale en petits morceaux et du poivre.", /*image:"images/patesCarbo.jpg"*/},
                { titre: "Crêpes", ingredients: "farine, lait, oeuf", tags: ["dessert", "facile", "abordable"],  description: "Mets composé d'une couche de pâte plus ou moins épaisse, faite de farine, oeufs et lait (ou eau). Elle est généralement servie en dessert." },
                { titre: "Burger maison", ingredients: "pain, steak, fromage", tags: ["bon marché", "four"],  description: "Sandwich d'origine allemande constitué de deux pains ronds, d'un steak haché, de crudités et de sauces. On le retrouve très souvent en restauration rapide.", image:"images/burger.jpg"},
                { titre: "Pain perdu", ingredients: "pain, sucre, beurre", tags: ["dessert", "rapide"],  description: "Mets composé de pain trempé dans un mélange lait/oeufs et cuit. Le but est d'éviter de gaspiller du pain devenu rassis.",image:"images/painPerdu_1.jpg"},
                { titre: "Rougail", ingredients: "saucisses, oignons, tomates pelées, piment", tags: ["hiver", "bon marché"],  description: "Plat de l'ile de la Réunion, composé de saucisses (fumées ou fraiches, au choix), de tomates en morceaux, d'oignons et éventuellement de piment.", image:"images/rougail.jpg" },
                { titre: "Tarte aux pommes", ingredients: "pommes, sucre, farine, oeufs", tags: ["dessert", "long", "bon marché"],  description: "Préparation sucrée, faite d'une pâte feuilletée (ou brisée) et de pommes coupées. Se consomme chaude, froide ou tempérée.",image:"images/tarte_aux_pommes_entiere.jpg" },
                { titre: "Omelette", ingredients: "oeufs, lardons, pommes de terre", tags: ["rapide", "facile", "bon marché"],  description: "Préparation culinaire à base d'oeufs battus, cuite à la poêle. Elle peut être garnie avec de la viande et/ou des aromates.", image: "images/omelette_1.jpg" },
                { titre: "Omelette marine", ingredients: "oeufs, crevettes, moules, pommes de terre (facultatif)", tags: ["rapide", "facile", "abordable"],  description: "Préparation culinaire à base d'oeufs battus, cuite à la poêle. Elle est ici garnie avec des fruits de mer et éventuellement des aromates.", image: "images/omeletteMer.jpg" },
                { titre: "Brownie", ingredients: "chocolat blanc, chocolat noir, oeufs, beurre, sucre, farine", tags: ["dessert", "long", "facile", "abordable"],  description: "Gâteau au chocolat cuit au four, pouvant être fondant par endroits. Servi généralement en dessert, froid ou chaud.", image: "images/brownie.jpg" },
                { titre: "Quiche Lorraine", ingredients: "oeufs, crème, pâte brisée, beurre, lait, lardons", tags: ["long", "facile", "bon marché"],  description: "Plat composé d'une pâte brisée sur laquelle on verse un mélange d'oeufs, de crème et de lardons. On peut aussi ajouter des oignons et/ou des champignons.", image: "images/quicheLorraine.jpg" }
            ]

            // gestion de la barre de recherche
                // gestion du bouton
            let resButton = document.getElementById("resButton");
            let initialColor = resButton.style.background;

            resButton.addEventListener("mousemove", function(){
                this.style.background = "blue";
            })
            resButton.addEventListener("mouseout", function(){
                this.style.background = initialColor;
               // this.innerText.style.color = initialTextColor;
            })


                // gestion de la barre (version JS)
            function research(){

                let valeur = normalize(document.getElementById("research").value.trim())

                // si la barre est vide on affiche tout
                if(valeur === ""){
                    afficher(recettes);
                    return;
                }

                let resultats = recettes.filter(recette => {
                    return normalize(recette.titre).includes(valeur) ||
                            normalize(recette.ingredients).includes(valeur)
                })


                afficher(resultats)
            }

            document.getElementById("formRes").addEventListener("submit", function(e){
                e.preventDefault()
                research()
            })

            // gestion de la sensibilité aux accents
            function normalize(str){
                return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            }


            function afficher(liste){

                let container = document.getElementById("templateCook")
                container.innerHTML = ""

                let nb=0
                liste.forEach((recette, index) => {
                    nb++;
                    container.innerHTML += 
                    `<div class="recette" onclick="ouvrirRecette(${index})">
                        <img src="${recette.image}" alt="${recette.titre}">
                        <h3>${recette.titre}</h3>
                        <p>${recette.tags.join(", ")}</p>
                    </div>`
                })

            }

            // structuration de l'affichage
            let container = document.getElementById("templateCook")

            container.style.display = "grid"
            container.style.gridTemplateColumns = "repeat(3, 1fr)"
            container.style.gap = "20px"
            container.style.padding = "20px"

            document.getElementById("research").addEventListener("input", research)
            
            afficher(recettes)

            // ouverture d'une recette
            window.ouvrirRecette = function(id){
                window.location.href = "recette.html?id=" + id
            }

            

        })


    </script>
</body>
</html>
