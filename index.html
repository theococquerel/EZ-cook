<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle"></title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header id="mainHeader">
        <h1 id="mainTitle">EZ'Cook</h1>

        <div id="formConnect">

            <div id="adminTitle">Connexion</div>
            <form method="post" id="formCo">

                <label>Identifiant</label>      
                <input id="login" type="text" name="login"><br>

                <label>Mot de passe</label>
                <input id="password" type="password" name="password"><br>

                <div id="logResult"></div>

                <button id="connection" type="submit">Se connecter</button>
                <button id="reset" type="reset">Reset</button>
            </form>

        </div>
    </header>
    <br><br><br><br><br><br>
    <main id="mainContent">
        <p style="font-weight: bolder;">Bienvenue sur le (meilleur) site de cuisine de tous les temps !</p>

        <div id="formResearch">
        <form method="post" id="formRes">
            <input id="research" type="text" name="research" placeholder="Rechercher une recette...">
            <button id="resButton" type="button">Rechercher</button>
        </form>
        </div>
        <br>
        <p>Ce site vous permettra de cuisiner simplement... et sans mettre le feu à la cuisine !</p><br><br>

        <div id="templateCook">

        </div>


    </main>
    <footer id="mainFooter">
        Sources : 
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function(){
            // préparation de la page (mode visiteur)
            let modeAdministrateurActif = false;
            let pageTitle = document.getElementById("pageTitle");
            pageTitle.innerText = "EZ'Cook";

            let form = document.getElementById("formCo");

            // récupération du conteneur du formulaire d'authentification
            let connect = document.getElementById("formConnect");
            // sauvegarde du contenu d'origine
            let connectInit = connect.innerHTML;




            // récupération et vérification de la paire login/MDP
            form.addEventListener('submit', function(event){
                event.preventDefault();
                let result = document.getElementById("logResult");


                if(form.login.value == ""){
                    event.preventDefault();
                    result.style.color = "yellow";
                    result.innerText = "L'identifiant ne peut pas être vide !";
                } else if(form.password.value == ""){
                    event.preventDefault();
                    result.style.color = "yellow";
                    result.innerText = "Le mot de passe ne peut pas être vide !";
                }
                else{
                    if(form.login.value == "admin2026" && form.password.value == "projet3"){
                        result.style.color = "lightgreen";
                        pageTitle.innerText = "EZ'Cook (administrateur)";
                        result.innerText = "Connexion réussie : entrée en mode administrateur.";
                        window.setTimeout(function(){
                            result.innerText = "";
                            let admin = document.getElementById("adminTitle");
                            admin.innerText = "Mode administrateur";
                            modeAdministrateurActif = true;
                            form.password.value = "";
                            form.login.value = "";
                            connect.innerHTML = `
                            <div id="adminTitle">Mode administrateur</div><br>
                            <button id="disconnect">Se déconnecter</button>`;

                            // gestion du cas déconnexion
                            let disco = document.getElementById("disconnect");
                            disco.addEventListener('click', function(){
                                connect.innerHTML = connectInit;
                                modeAdministrateurActif = false;
                                pageTitle.innerText = "EZ'Cook";
                            })
                        }, 5000)

                        

                    } else{
                        result.style.color = "yellow";
                        result.innerText = "Identifiant ou mot de passe incorrect.";
                    } 
                }
            })

            form.addEventListener('reset', function(){
                let result = document.getElementById("logResult");
                result.innerText = ""
            })

           
                    





            let recettes = [
                { titre: "Pâtes carbonara", ingredients: "pâtes, oeuf, lardons" },
                { titre: "Salade de tomates", ingredients: "tomate, huile, sel" },
                { titre: "Crêpes", ingredients: "farine, lait, oeuf" },
                { titre: "Burger maison", ingredients: "pain, steak, fromage" },
                { titre: "Pain perdu", ingredients: "pain, sucre, beurre"},
                { titre: "Rougail", ingredients: "saucisses, oignons, tomates pelées, piment"},
                { titre: "Tarte aux pommes", ingredients: "pommes, sucre, farine, oeufs"}
            ]

            // gestion de la barre de recherche
                // gestion du bouton
            let resButton = document.getElementById("resButton");
            let initialColor = resButton.style.background;

            resButton.addEventListener("mousemove", function(){
                this.style.background = "blue";
            })
            resButton.addEventListener("mouseout", function(){
                this.style.background = initialColor;
               // this.innerText.style.color = initialTextColor;
            })
                // gestion de la barre (version JS)
            function research(){

                let valeur = document.getElementById("research").value.toLowerCase()

                let resultats = recettes.filter(recette => {
                    return recette.titre.toLowerCase().includes(valeur) ||
                        recette.ingredients.toLowerCase().includes(valeur)
                })

                afficher(resultats)
            }

            document.getElementById("formRes").addEventListener("submit", function(e){
                e.preventDefault()
                research()
            })


            function afficher(liste){

                let container = document.getElementById("templateCook")
                container.innerHTML = ""

                let nb=0
                liste.forEach(recette => {
                    nb++;
                    container.innerHTML += 
                    `
                        <div class="recette">
                            <h3>${recette.titre}</h3>
                            <p>${recette.ingredients}</p>${(nb%3 == 0) ? "<br><br>" : "     "}
                        </div>
                    `
                })

            }

            // structuration de l'affichage
            let container = document.getElementById("templateCook")

            container.style.display = "grid"
            container.style.gridTemplateColumns = "repeat(4, 1fr)"
            container.style.gap = "20px"
            container.style.padding = "20px"

            document.getElementById("research").addEventListener("input", research)
            if(document.getElementById("research").value == ""){
                afficher("");
            }
            console.log(resultats)
            afficher(resultats)



        })


    </script>
</body>
</html>
