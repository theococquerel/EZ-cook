<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Recette</title>
</head>
<body>
    <header id="mainHeader">
        <h1 id="mainTitle">EZ'Cook</h1>

        <div id="formConnect">

            <div id="adminTitle">Connexion</div>
            <form method="post" id="formCo">

                <label>Identifiant</label>      
                <input id="login" type="text" name="login"><br>

                <label>Mot de passe</label>
                <input id="password" type="password" name="password"><br>

                <div id="logResult"></div>

                <button id="connection" type="submit">Se connecter</button>
                <button id="reset" type="reset">Reset</button>
            </form>

        </div>
    </header>
    <br><br><br><br><br>
    <button id="backPage">Retour accueil</button>
    <div id="recettePage">
        <h1 id="titre-recette"></h1>
        <br>
        <div id="img-recette"></div>
        <br>
        <h2>Ingrédients</h2>
        <div id="listIngred"></div>
        <br>
        <h2>Description</h2>
        <p id="recette-txt"></p>
    </div>

    <footer id="mainFooter">
        Sources : 
    </footer>

    <script>

        let recettes = [
                { titre: "Pâtes carbonara", ingredients: "pâtes, oeuf, lardons", tags: ["facile", "bon marché"], description: "Spécialité italienne, à base de spaghetti auxquels sont ajoutés du pecorino et des jaunes d'oeuf, puis du guanciale en petits morceaux et du poivre.", image:"images/patesCarbo.jpg"},
                { titre: "Crêpes", ingredients: "farine, lait, oeuf", tags: ["dessert", "facile", "abordable"],  description: "Mets composé d'une couche de pâte plus ou moins épaisse, faite de farine, oeufs et lait (ou eau). Elle est généralement servie en dessert.", image:"images/crepes2.jpg" },
                { titre: "Burger maison", ingredients: "pain, steak, fromage", tags: ["bon marché", "four"],  description: "Sandwich d'origine allemande constitué de deux pains ronds, d'un steak haché, de crudités et de sauces. On le retrouve très souvent en restauration rapide.", image:"images/burger.jpg"},
                { titre: "Pain perdu", ingredients: "pain, sucre, beurre", tags: ["dessert", "antigaspi"],  description: "Mets composé de pain trempé dans un mélange lait/oeufs et cuit. Le but est d'éviter de gaspiller du pain devenu rassis.",image:"images/painPerdu_1.jpg"},
                { titre: "Rougail", ingredients: "saucisses, oignons, tomates pelées, piment", tags: ["hiver", "bon marché"],  description: "Plat de l'ile de la Réunion, composé de saucisses (fumées ou fraiches, au choix), de tomates en morceaux, d'oignons et éventuellement de piment.", image:"images/rougail.jpg" },
                { titre: "Tarte aux pommes", ingredients: "pommes, sucre, farine, oeufs", tags: ["dessert", "long", "bon marché"],  description: "Préparation sucrée, faite d'une pâte feuilletée (ou brisée) et de pommes coupées. Se consomme chaude, froide ou tempérée.",image:"images/tarte_aux_pommes_entiere.jpg" },
                { titre: "Omelette", ingredients: "oeufs, lardons, pommes de terre", tags: ["facile", "bon marché"],  description: "Préparation culinaire à base d'oeufs battus, cuite à la poêle. Elle peut être garnie avec de la viande et/ou des aromates.", image: "images/omelette_1.jpg" },
                { titre: "Omelette marine", ingredients: "oeufs, crevettes, moules, pommes de terre (facultatif)", tags: ["facile", "abordable"],  description: "Préparation culinaire à base d'oeufs battus, cuite à la poêle. Elle est ici garnie avec des fruits de mer et éventuellement des aromates.", image: "images/omeletteMer.jpg" },
                { titre: "Brownie", ingredients: "chocolat blanc, chocolat noir, oeufs, beurre, sucre, farine", tags: ["dessert", "long", "facile", "abordable"],  description: "Gâteau au chocolat cuit au four, pouvant être fondant par endroits. Servi généralement en dessert, froid ou chaud.", image: "images/brownie.jpg" },
                { titre: "Quiche Lorraine", ingredients: "oeufs, crème, pâte brisée, beurre, lait, lardons", tags: ["long", "facile", "bon marché"],  description: "Plat composé d'une pâte brisée sur laquelle on verse un mélange d'oeufs, de crème et de lardons. On peut aussi ajouter des oignons et/ou des champignons.", image: "images/quicheLorraine.jpg" }
            ]


        document.addEventListener('DOMContentLoaded', function(){
            let params = new URLSearchParams(window.location.search);
            let id = params.get("id");
            
            let recette = recettes[id];
            if(!recette){
                document.body.innerHTML = "<h1>Recette introuvable</h1>";
                return;
            }

            document.getElementById("titre-recette").innerText = recette.titre;
            document.getElementById("img-recette").innerHTML = 
                `<img src="${recette.image}" style="width:500px">`;
            document.getElementById("listIngred").innerHTML = recette.ingredients;

            document.getElementById("recette-txt").innerText = recette.description;

            let backPage = document.getElementById("backPage");

            backPage.addEventListener('click', function(){
                window.location.href = "index.html"
            })

        })


    </script>
</body>
</html>
